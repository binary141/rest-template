services:
  api:
    build:
      context: .
      target: live-dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app

  db:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app

networks:
  app:
    driver: bridge
